services:
  php:
    build:
      context: ./docker/php-fpm
    image: support-php-fpm
    working_dir: /var/www
    volumes:
      - ./services/api:/var/www
      - ./docker/php-fpm/zz-pm.conf:/usr/local/etc/php-fpm.d/zz-pm.conf:ro
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: support
      DB_USERNAME: support
      DB_PASSWORD: support
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      SCANNER_BASE_URL: http://scanner:3001
      FINALIZE_BARRIER: 1
      FINALIZE_BARRIER_TIMEOUT_MS: 15000
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - scanner

  web:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./services/api:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: support
      MYSQL_USER: support
      MYSQL_PASSWORD: support
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: support
      RABBITMQ_DEFAULT_PASS: support
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  scanner:
    build: ./services/scanner-node
    ports:
      - "3001:3001"

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
